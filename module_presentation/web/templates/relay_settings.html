<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки реле</title>
    <script src="/static/js/jquery.min.js"></script>
    <script src="/static/js/relay_settings.js"></script>
    <link rel="stylesheet" href="/static/css/settings.css">
    <style>
        /* Переключатель Принудительно / Условия */
        .mode-toggle {
            display: flex;
            gap: 0;
            margin: 10px 0;
            border: 1px solid #999;
            border-radius: 6px;
            overflow: hidden;
        }
        .mode-toggle button {
            flex: 1;
            padding: 10px 5px;
            border: none;
            background: #fff;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.2s;
            margin: 0;
            height: auto;
            width: auto;
        }
        .mode-toggle button.active {
            background: #2c3e50;
            color: #fff;
        }

        /* Блок текущего состояния */
        .state-block {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }
        .state-label {
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }
        .btn-state {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-state.on  { background: #27ae60; color: #fff; }
        .btn-state.off { background: #aaa;    color: #fff; }
        .btn-state.readonly { cursor: default; opacity: 0.8; }

        /* Условия */
        .condition-row {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fafafa;
            margin-bottom: 8px;
        }
        .btn-del-condition {
            background: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            height: 32px;
            width: 30px;
            padding: 0;
            line-height: 32px;
            text-align: center;
        }

        /* Период с условием */
        .period-block {
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .period-header {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f4f4f4;
            padding: 6px 8px;
            border-bottom: 1px solid #ccc;
        }
        .period-header input[type="time"] {
            flex: 1;
            margin-bottom: 0;
            height: 30px;
            font-size: 12px;
        }
        .period-header span {
            font-size: 12px;
            color: #666;
            white-space: nowrap;
        }
        .btn-del-period {
            background: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            height: 30px;
            width: 30px;
            padding: 0;
        }
        .period-body {
            padding: 8px;
        }

        .condition-labels {
            display: none;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="sticky-action-bar">
        <a href="/" class="back-btn">← Назад</a>
        <button id="save_btn" class="save_btn_sticky">Сохранить</button>
    </div>

    <h2 id="device_title" style="margin-top: 10px;">Загрузка...</h2>

    <!-- Основные поля -->
    <label>Название реле:</label>
    <input type="text" id="relay_name" placeholder="Например: Обогреватель в ванной">

    <label>Тип отображения (иконка):</label>
    <select id="ui_type">
        <optgroup label="Оборудование">
            <option value="relay">Реле (⚡)</option>
            <option value="pump">Насос / Полив (💦)</option>
            <option value="gate">Ворота / Замок (🔒)</option>
            <option value="fan">Вентиляция (🌀)</option>
            <option value="light">Свет (💡)</option>
            <option value="power">Питание 220В (🔌)</option>
        </optgroup>
    </select>

    <label>Местоположение (Локация):</label>
    <select id="location_select">
        <option value="">Выберите локацию...</option>
    </select>

    <label>Функциональная группа:</label>
    <select id="group_select">
        <option value="">Выберите группу...</option>
    </select>

    <div class="timeout-settings-group">
        <label for="offline_timeout">⏰ Контроль связи (минут бездействия):</label>
        <input type="number" id="offline_timeout" min="1" max="1440" placeholder="Например: 5">
    </div>

    <hr>

    <!-- Текущее состояние -->
    <label>Текущее состояние:</label>
    <div class="state-block">
        <button id="btn_state" class="btn-state off">ВЫКЛЮЧЕНО</button>
        <span id="state_hint" style="font-size:12px; color:#666;"></span>
    </div>

    <!-- Переключатель режима -->
    <label>Режим управления:</label>
    <div class="mode-toggle">
        <button id="btn_force" class="active" data-mode="force">Принудительно</button>
        <button id="btn_conditions" data-mode="conditions">По условиям</button>
    </div>

    <hr>

    <!-- Базовое условие -->
    <div id="conditions_section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <h3 style="margin:0;">⚡ Базовое условие</h3>
        </div>

        <div class="condition-labels">
            <span>Датчик</span>
            <span>Условие</span>
            <span>Значение</span>
            <span></span>
        </div>
        <div id="base_conditions_container"></div>

        <button type="button" id="add_base_condition_btn"
                style="width:100%; margin-top:4px; padding:6px; cursor:pointer;">
            ➕ Добавить условие по датчику
        </button>

        <hr>

        <!-- Периоды с условиями -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <h3 style="margin:0;">⏰ Расписание</h3>
            <button type="button" id="add_period_btn"
                    style="cursor:pointer; padding:5px 10px; width:auto;">
                ➕ Добавить период
            </button>
        </div>

        <div id="periods_container"></div>

        <div id="no_periods_alert"
             style="color:#666; text-align:center; padding:15px; border:1px dashed #ccc; margin-bottom:15px;">
            Расписание не задано. Реле будет круглосуточно использовать базовое условие.
        </div>
    </div>

</div>
</body>
</html>
