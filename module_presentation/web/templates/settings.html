<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки модуля</title>
    <script src="/static/js/jquery.min.js"></script>
    <script src="/static/js/settings.js"></script>
    <link rel="stylesheet" href="/static/css/settings.css">
</head>
<body>

<div class="card">
    <div class="sticky-action-bar">
        <a href="/" class="back-btn">← Назад</a>
        <button id="save_btn" class="save_btn_sticky">Сохранить</button>
    </div>

    <h2 id="device_title" style="margin-top: 10px;">Загрузка...</h2>

    <label>🔕 Не звонить до:</label>
    
    <div class="mute-quick-actions">
        <button type="button" class="btn-mute-quick" data-hours="1">+1 ч</button>
        <button type="button" class="btn-mute-quick" data-hours="2">+2 ч</button>
        <button type="button" class="btn-mute-quick" data-hours="3">+3 ч</button>
        <button type="button" class="btn-mute-quick" data-hours="8">+8 ч</button>
        <button type="button" class="btn-mute-quick btn-mute-reset" id="btn-mute-clear">Сброс</button>
    </div>

    <div class="mute-manual-time" style="display: flex; gap: 5px; margin-top: 10px; align-items: center;">
        <input type="date" id="mute_date" style="width: 60%; margin-bottom: 0; height: 34px; padding: 2px 5px; text-align: center;">
        
        <input type="time" id="mute_time" style="width: 40%; margin-bottom: 0; height: 34px; padding: 2px 5px; text-align: center; font-weight: bold;">
    </div>
    <hr>

    <label>Название датчика:</label>
    <input type="text" id="sensor_name" placeholder="Например: Температура в спальне">

    <label>Тип отображения (иконка):</label>
    <select id="ui_type">
        <optgroup label="Числовые">
            <option value="numeric">Обычное число (Градусы/Влажность)</option>
        </optgroup>
        <optgroup label="Безопасность (Бинарные)">
            <option value="leak">Датчик протечки (🚨)</option>
            <option value="smoke">Датчик дыма (🔥)</option>
            <option value="door">Дверь / Окно (🚪)</option>
            <option value="motion">Движение (🏃)</option>
            <option value="gas">Утечка газа (☣️)</option>
        </optgroup>
        <optgroup label="Оборудование">
            <option value="power">Питание 220В (🔌)</option>
            <option value="pump">Насос / Полив (💦)</option>
            <option value="gate">Ворота / Замок (🔒)</option>
            <option value="fan">Вентиляция (🌀)</option>
            <option value="light">Свет (💡)</option>
        </optgroup>
    </select>

    <label>Местоположение (Локация):</label>
    <select id="location_select">
        <option value="">Выберите локацию...</option>
    </select>

    <label>Функциональная группа:</label>
    <select id="group_select">
        <option value="">Выберите группу...</option>
    </select>

    <hr>

    <div class="thresholds-grid">
    
        <div class="input-group">
            <label>Авария Мин</label>
            <input type="number" step="0.1" id="edit_alarm_min" placeholder="нет">
        </div>
        <div class="input-group">
            <label>Реле Мин</label>
            <input type="number" step="0.1" id="edit_relay_min" placeholder="нет">
        </div>

        <div class="input-group">
            <label>Реле Макс</label>
            <input type="number" step="0.1" id="edit_relay_max" placeholder="нет">
        </div>
        <div class="input-group">
            <label>Авария Макс</label>
            <input type="number" step="0.1" id="edit_alarm_max" placeholder="нет">
        </div>
        
    </div>

    <hr>

    <div class="schedule_section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3>⏰ Расписание по времени</h3>
            <button type="button" id="add_period_btn" style="cursor: pointer; padding: 5px 10px; width: auto;">
                ➕ Добавить период
            </button>
        </div>

        <table id="schedules_table" style="width: 100%; border-collapse: collapse; margin-bottom: 15px; display: none;">
            <thead>
                <tr style="background-color: #f4f4f4; text-align: left;">
                    <th style="padding: 6px 8px; border: 1px solid #ccc; font-size: 12px;">Уставки периода</th>
                    <th style="padding: 6px 2px; border: 1px solid #ccc; text-align: center; width: 40px;"></th>
                </tr>
            </thead>
            <tbody id="schedules_container">
            </tbody>
        </table>

        <div id="no_schedules_alert" style="color: #666; text-align: center; padding: 15px; border: 1px dashed #ccc; margin-bottom: 15px;">
            Расписание не задано. Датчик будет круглосуточно использовать базовые пороги.
        </div>
    </div>

    <hr>
    </div>

</body>
</html>
