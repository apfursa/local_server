<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Порядок отображения датчиков</title>
    <script src="/static/js/jquery.min.js"></script>
    <link rel="stylesheet" href="/static/css/sort.css">
</head>
<body>

    <div class="card">
        <div class="sticky-action-bar">
            <a href="/" class="back-btn">← Назад</a>
            <button id="save_btn" class="save_btn_sticky">Сохранить</button>
        </div>

        <h2>Сортировка датчиков</h2>

        <div class="table-container" id="sort_table_container">
            </div>
    </div>

    <script type="text/template" id="template-sort-layout">
        <table class="dashboard-table sort-table-mode">
            <thead>
                <tr>
                    <th>Название датчика</th>
                    <th class="col-sort-btn">Вверх</th>
                    <th class="col-sort-btn">Вниз</th>
                </tr>
            </thead>
            <tbody class="table-sort-body-target"></tbody>
        </table>
    </script>

    <script type="text/template" id="template-sort-row">
        <tr class="sort-item-row" data-sensor-id="[%sensor_id%]" data-type="[%type%]" data-is-relay="[%is_relay%]">
            <td class="col-name cell-sort-name">[%name%]</td>
            <td class="col-narrow cell-up-action cell-sort-action-pad">[%btn_up%]</td>
            <td class="col-narrow cell-down-action cell-sort-action-pad">[%btn_down%]</td>
        </tr>
    </script>

    <script src="/static/js/sort.js"></script>
</body>
</html>
