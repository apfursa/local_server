<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель Мониторинга</title>
    <script src="/static/js/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="/static/css/index.css">
    <link rel="stylesheet" href="/static/css/grafik.css">
</head>
<body>

    <div class="control-panel">
        <div class="control-group">
            <button class="btn-toggle active" data-view="table">📋 Таблица</button>
            <button class="btn-toggle" data-view="cards">🗂️ Карточки</button>
        </div>
        <div class="control-group">
            <label>Группировка:</label>
            <select id="group-select">
                <option value="none">Без группировки</option>
                <option value="location">По локациям (Местам)</option>
                <option value="group">По задачам (Группам)</option>
            </select>
        </div>
    </div>

    <div id="ui-container"></div>

    <script type="text/template" id="template-table-layout">
        <table class="dashboard-table">
            <thead>
                <tr>
                    <th class="col-narrow">ID</th>
                    <th>Название датчика</th>
                    <th class="col-narrow">Значение</th>
                    <th class="col-narrow">Время</th>
                    <th class="col-narrow">⚙️</th>
                </tr>
            </thead>
            <tbody class="table-body-target"></tbody>
        </table>
    </script>

    <script type="text/template" id="template-table-row">
        <tr id="row-[%uid%]" class="[%status_class%] [%offline_class%]">
            <td style="font-weight: bold; color: #666;">[%sensor_id%]</td>
            <td class="col-name">
                <form id="form-[%uid%]" action="/rename" method="post">
                    <input type="hidden" name="sensor_id" value="[%sensor_id%]">
                    <input type="hidden" name="sensor_type" value="[%type%]">
                    <input type="text" name="new_name" value="[%name%]" onchange="confirmRename('[%uid%]', this)" data-old-value="[%name%]">
                </form>
            </td>
            <td class="col-narrow" onclick="toggleChart('[%sensor_id%]', '[%type%]')">
                <b data-field="value" class="temp-val" style="font-size: 1.2em;">[%display_value%]</b>
            </td>
            <td class="col-narrow"><span data-field="time" class="time-val">[%time_str%]</span></td>
            <td class="col-narrow">
                <a href="/settings/[%sensor_id%]?type=[%type%]" class="settings-link">⚙️</a>
            </td>
        </tr>
        <tr id="chart-row-[%uid%]" class="chart-row" style="display: none;">
            <td colspan="5">
                <div class="chart-container"><canvas id="canvas-[%uid%]"></canvas></div>
            </td>
        </tr>
    </script>

    <script type="text/template" id="template-card">
        <div id="row-[%uid%]" class="sensor-card [%status_class%] [%offline_class%]">
            <div class="card-header">
                <span class="card-id">#[%sensor_id%] ([%type%])</span>
                <a href="/settings/[%sensor_id%]?type=[%type%]" class="card-edit-btn">⚙️</a>
            </div>
            <div class="card-body" onclick="toggleChart('[%sensor_id%]', '[%type%]')">
                <div class="card-name">[%name%]</div>
                <div class="card-value-wrapper">
                    <span data-field="value" class="card-value">[%display_value%]</span>
                    <span class="card-unit">[%unit%]</span>
                </div>
            </div>
            <div class="card-footer">
                <span data-field="time" class="time-val">⏱️ [%time_str%]</span>
                <span class="card-tag">[%group%]</span>
            </div>
            <div id="chart-row-[%uid%]" class="chart-row card-chart-row" style="display: none;">
                <div class="chart-container"><canvas id="canvas-[%uid%]"></canvas></div>
            </div>
        </div>
    </script>

    <script src="/static/js/grafik_plugin.js"></script>
    <script src="/static/js/grafik.js"></script>
    <script src="/static/js/index.js"></script>
</body>
</html>
