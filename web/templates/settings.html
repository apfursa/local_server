<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки модуля</title>
    <script src="/static/js/jquery.min.js"></script>
    <link rel="stylesheet" href="/static/css/settings.css">
</head>
<body>

<div class="card">
    <h2 id="device_title">Загрузка...</h2>

    <label>Тип отображения (иконка):</label>
    <select id="ui_type">
        <optgroup label="Числовые">
            <option value="numeric">Обычное число (Градусы/Влажность)</option>
        </optgroup>
        <optgroup label="Безопасность (Бинарные)">
            <option value="leak">Датчик протечки (🚨)</option>
            <option value="smoke">Датчик дыма (🔥)</option>
            <option value="door">Дверь / Окно (🚪)</option>
            <option value="motion">Движение (🏃)</option>
            <option value="gas">Утечка газа (☣️)</option>
        </optgroup>
        <optgroup label="Оборудование">
            <option value="power">Питание 220В (🔌)</option>
            <option value="pump">Насос / Полив (💦)</option>
            <option value="gate">Ворота / Замок (🔒)</option>
            <option value="fan">Вентиляция (🌀)</option>
            <option value="light">Свет (💡)</option>
        </optgroup>
    </select>

    <hr>
    
    <label>Минимальный порог:</label>
    <input type="number" id="min_val" step="0.1">

    <label>Максимальный порог:</label>
    <input type="number" id="max_val" step="0.1">

    <button id="save_btn">Сохранить</button>
    
    <a href="/" class="back">← Вернуться назад</a>
</div>

<script src="/static/js/settings.js"></script>

</body>
</html>
